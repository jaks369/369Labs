services:
  - type: web
    name: 369labs
    runtime: node
    buildCommand: pnpm install --no-frozen-lockfile && pnpm db:push && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: VITE_DERIV_APP_ID
        sync: false
      - key: AI_API_KEY
      - key: OPENAI_API_BASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false